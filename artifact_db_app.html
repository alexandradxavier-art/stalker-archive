<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>База аномальных образцов — ЧАЗ</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@200;300;400;600&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0d09;--paper:#181a12;--paper2:#121410;--paper3:#0e100c;
  --green:#7ab648;--green-dim:#4a7228;--green-dark:#2a4218;
  --amber:#c8a84b;--amber-dim:#7a6428;
  --red:#b84040;--red-dim:#7a2828;
  --text:#c4c09e;--text-dim:#6e6c5c;--text-faint:#3a392e;
  --border:#252818;--border2:#1e2016;
  --scan:rgba(100,180,50,0.02);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'PT Serif',Georgia,serif;font-size:14px;line-height:1.7;position:relative}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,var(--scan) 3px,var(--scan) 4px);pointer-events:none;z-index:9999}

/* LAYOUT */
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:248px;flex-shrink:0;background:var(--paper2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* SIDEBAR */
.sb-head{padding:16px 16px 12px;border-bottom:1px solid var(--border);position:relative;flex-shrink:0}
.sb-head::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--green),var(--green-dim),transparent)}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.sb-logo svg{width:28px;height:28px;flex-shrink:0}
.sb-title{font-family:'Oswald',sans-serif;font-weight:600;font-size:12px;color:var(--green);letter-spacing:1.5px;text-transform:uppercase;line-height:1.2}
.sb-sub{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase}

.sb-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex-shrink:0}
.st-box{background:var(--paper2);padding:8px 12px}
.st-n{font-family:'Share Tech Mono',monospace;font-size:16px;color:var(--green);line-height:1}
.st-n.am{color:var(--amber)}
.st-l{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-track{background:transparent}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border)}

.sb-section{padding:8px 14px 4px;font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:2px;color:var(--text-faint);text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.sb-section button{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:14px;line-height:1;padding:0 2px;transition:color 0.2s}
.sb-section button:hover{color:var(--green)}

.sb-item{display:flex;align-items:center;width:100%;padding:8px 14px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:11px;text-align:left;transition:all 0.15s;border-left:2px solid transparent;gap:8px}
.sb-item:hover{color:var(--text);background:rgba(122,182,72,0.04);border-left-color:var(--green-dark)}
.sb-item.active{color:var(--green);background:rgba(122,182,72,0.07);border-left-color:var(--green)}
.sb-item .si-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sb-item .si-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item .si-count{font-size:9px;color:var(--text-faint);flex-shrink:0}
.sb-item .si-actions{display:none;gap:4px;flex-shrink:0}
.sb-item:hover .si-actions{display:flex}
.si-act-btn{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:11px;padding:1px 3px;transition:color 0.15s}
.si-act-btn:hover{color:var(--amber)}
.si-act-btn.del:hover{color:var(--red)}

.sb-add-cat{margin:10px 14px;padding:8px;background:none;border:1px dashed var(--green-dark);color:var(--green-dim);font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;width:calc(100% - 28px);transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.sb-add-cat:hover{border-color:var(--green);color:var(--green);background:rgba(122,182,72,0.04)}

.sb-foot{padding:10px 14px;border-top:1px solid var(--border);font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-faint);line-height:1.8;flex-shrink:0}

/* MAIN HEADER */
.main-head{padding:16px 24px 12px;border-bottom:1px solid var(--border);background:var(--paper2);display:flex;align-items:center;gap:16px;flex-shrink:0}
.mh-title{font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;color:var(--green);letter-spacing:1px;text-transform:uppercase;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;animation:flicker 14s infinite}
@keyframes flicker{0%,97%,100%{opacity:1}98.5%{opacity:0.2}}
.mh-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);white-space:nowrap}
.class-tag{background:var(--red);padding:4px 10px;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:#ffd0d0;text-transform:uppercase;white-space:nowrap;flex-shrink:0}

/* TOOLBAR */
.toolbar{padding:10px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--paper3)}
.search-box{display:flex;align-items:center;gap:0;flex:1;max-width:320px;border:1px solid var(--border2);background:var(--paper2)}
.search-box input{flex:1;background:none;border:none;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:7px 10px;outline:none}
.search-box input::placeholder{color:var(--text-faint)}
.search-ico{padding:7px 10px;color:var(--text-dim);font-size:12px}

.tb-select{background:var(--paper2);border:1px solid var(--border2);color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:10px;padding:7px 10px;outline:none;cursor:pointer}
.tb-select option{background:var(--paper2)}
.tb-select:focus{border-color:var(--green-dark)}

.tb-sep{width:1px;height:24px;background:var(--border);flex-shrink:0}

.view-btn{background:none;border:1px solid var(--border2);color:var(--text-dim);padding:7px 10px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:10px;transition:all 0.15s}
.view-btn.active,.view-btn:hover{border-color:var(--green-dark);color:var(--green)}

.add-record-btn{margin-left:auto;padding:8px 16px;background:none;border:1px solid var(--green-dim);color:var(--green-dim);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.add-record-btn:hover{border-color:var(--green);color:var(--green);background:rgba(122,182,72,0.06)}

/* CONTENT AREA */
.content-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 24px}
.content-area::-webkit-scrollbar{width:4px}
.content-area::-webkit-scrollbar-track{background:transparent}
.content-area::-webkit-scrollbar-thumb{background:var(--border)}

/* LIST VIEW */
.list-table{width:100%;border-collapse:collapse}
.list-table th{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--paper2);cursor:pointer;user-select:none;white-space:nowrap}
.list-table th:hover{color:var(--text)}
.list-table td{padding:9px 12px;border-bottom:1px solid var(--border2);color:var(--text);vertical-align:middle;font-size:13px}
.list-table tr.data-row:hover td{background:rgba(122,182,72,0.03);cursor:pointer}
.list-table td.mono{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--green)}
.list-table .th-sort::after{content:' ↕';opacity:0.4}
.list-table .th-asc::after{content:' ↑';opacity:1;color:var(--green)}
.list-table .th-desc::after{content:' ↓';opacity:1;color:var(--green)}

.status-chip{display:inline-flex;align-items:center;gap:5px;font-family:'Share Tech Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
.chip-dot{width:5px;height:5px;border-radius:50%}
.chip-done{color:var(--green)}.dot-done{background:var(--green);box-shadow:0 0 4px var(--green);animation:p 2s infinite}
.chip-wip{color:var(--amber)}.dot-wip{background:var(--amber);box-shadow:0 0 4px var(--amber);animation:p 3s infinite}
.chip-wait{color:var(--text-dim)}.dot-wait{background:var(--text-dim)}
@keyframes p{0%,100%{opacity:1}50%{opacity:0.3}}

/* CARD GRID */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:2px}
.cv{border:1px solid var(--border);background:var(--paper);cursor:pointer;transition:border-color 0.2s;position:relative;overflow:hidden;display:flex;flex-direction:column}
.cv:hover{border-color:var(--green-dark)}
.cv-thumb{height:120px;background:var(--paper3);overflow:hidden;position:relative;flex-shrink:0}
.cv-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.cv-thumb-empty{display:flex;align-items:center;justify-content:center;height:100%;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-faint);letter-spacing:2px;text-transform:uppercase}
.cv-top{display:flex;align-items:center;border-bottom:1px solid var(--border2);flex-shrink:0}
.cv-num{width:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--paper2);border-right:1px solid var(--border2);font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--green-dim);padding:10px 0}
.cv-name{flex:1;padding:9px 12px;font-family:'Oswald',sans-serif;font-size:13px;color:var(--text);text-transform:uppercase;letter-spacing:0.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cv-body{padding:10px 12px;font-size:12px;color:var(--text-dim);line-height:1.55;flex:1;min-height:48px}
.cv-foot{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-top:1px solid var(--border2);background:var(--paper2);flex-shrink:0}
.cv-cat{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}
.cv-date{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-faint)}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:260px;color:var(--text-faint);gap:12px}
.empty-state .es-ico{font-family:'Share Tech Mono',monospace;font-size:28px}
.empty-state p{font-size:12px;text-align:center;max-width:260px;line-height:1.7}

/* DETAIL PANEL */
.detail-panel{position:absolute;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;overflow:hidden}
.detail-panel.open{display:flex}
.dp-head{padding:14px 24px;border-bottom:1px solid var(--border);background:var(--paper2);display:flex;align-items:center;gap:12px;flex-shrink:0}
.dp-back{background:none;border:1px solid var(--border);color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:10px;padding:6px 12px;cursor:pointer;transition:all 0.15s}
.dp-back:hover{border-color:var(--green-dim);color:var(--green-dim)}
.dp-title{font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;color:var(--green);text-transform:uppercase;letter-spacing:1px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dp-actions{display:flex;gap:8px;flex-shrink:0}
.act-btn{padding:7px 14px;border:1px solid;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;background:none;transition:all 0.15s}
.btn-edit{border-color:var(--amber-dim);color:var(--amber-dim)}.btn-edit:hover{border-color:var(--amber);color:var(--amber);background:rgba(200,168,75,0.06)}
.btn-del{border-color:var(--red-dim);color:var(--red-dim)}.btn-del:hover{border-color:var(--red);color:var(--red);background:rgba(184,64,64,0.06)}
.btn-save{border-color:var(--green-dim);color:var(--green-dim)}.btn-save:hover{border-color:var(--green);color:var(--green);background:rgba(122,182,72,0.06)}
.btn-cancel{border-color:var(--border);color:var(--text-dim)}.btn-cancel:hover{border-color:var(--text-dim);color:var(--text)}

.dp-body{flex:1;overflow-y:auto;padding:24px;display:grid;grid-template-columns:1fr 300px;gap:16px}
.dp-body::-webkit-scrollbar{width:4px}
.dp-body::-webkit-scrollbar-thumb{background:var(--border)}

.dp-main{}
.dp-side{display:flex;flex-direction:column;gap:12px}

.dp-block{border:1px solid var(--border);background:var(--paper);margin-bottom:12px}
.dp-block:last-child{margin-bottom:0}
.dp-block-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;padding:8px 14px;border-bottom:1px solid var(--border2);background:var(--paper2)}
.dp-block-body{padding:14px}

.field-view{margin-bottom:12px}
.field-view:last-child{margin-bottom:0}
.fv-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:5px}
.fv-val{font-size:13px;color:var(--text);white-space:pre-wrap;line-height:1.6}
.fv-val.empty{color:var(--text-faint);font-style:italic}
.fv-val.mono{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--green)}
.fv-val.am{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--amber)}

/* PHOTOS */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}
.photo-item{position:relative;aspect-ratio:1;overflow:hidden;border:1px solid var(--border2);cursor:pointer;background:var(--paper3)}
.photo-item img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity 0.2s}
.photo-item:hover img{opacity:0.7}
.photo-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.7);border:none;color:var(--red);width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:10px;display:none;align-items:center;justify-content:center;line-height:1}
.photo-item:hover .photo-del{display:flex}
.photo-add-btn{aspect-ratio:1;border:1px dashed var(--border);background:none;color:var(--text-faint);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;transition:all 0.2s}
.photo-add-btn:hover{border-color:var(--green-dark);color:var(--green-dim)}
.photo-add-btn span{font-size:20px;line-height:1}

/* PHOTO LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9000;display:none;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border:1px solid var(--border)}
.lb-close{position:absolute;top:20px;right:24px;background:none;border:none;color:var(--text-dim);font-size:24px;cursor:pointer;z-index:1}
.lb-close:hover{color:var(--text)}

/* CUSTOM FIELDS IN VIEW MODE */
.cf-row{display:flex;flex-direction:column;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border2)}
.cf-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.cf-key{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:3px}
.cf-val{font-size:13px;color:var(--text)}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.full{grid-template-columns:1fr}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase}
input[type=text],input[type=date],textarea,select{background:var(--paper3);border:1px solid var(--border);color:var(--text);font-family:'PT Serif',Georgia,serif;font-size:13px;padding:8px 10px;outline:none;transition:border-color 0.2s;width:100%;resize:vertical}
input[type=text]:focus,input[type=date]:focus,textarea:focus,select:focus{border-color:var(--green-dark)}
input::placeholder,textarea::placeholder{color:var(--text-faint)}
select{font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer}
select option{background:var(--paper2)}
textarea{min-height:80px;line-height:1.6}

.cf-editor{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.cf-pair{display:flex;gap:6px;align-items:center}
.cf-pair input{flex:1}
.cf-pair .cf-rm{background:none;border:1px solid var(--red-dim);color:var(--red-dim);padding:8px 10px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:10px;transition:all 0.15s;flex-shrink:0}
.cf-pair .cf-rm:hover{border-color:var(--red);color:var(--red)}
.cf-add{padding:7px;background:none;border:1px dashed var(--border);color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;width:100%;transition:all 0.15s;margin-top:4px}
.cf-add:hover{border-color:var(--green-dark);color:var(--green-dim)}

/* MODAL (categories rename / confirm) */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:5000;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--paper);border:1px solid var(--green-dim);width:100%;max-width:420px;position:relative;animation:mIn 0.18s ease}
@keyframes mIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--green),var(--green-dim),transparent)}
.modal-head{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:'Oswald',sans-serif;font-size:14px;color:var(--green);text-transform:uppercase;letter-spacing:1px}
.modal-close-x{background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;padding:0 4px}
.modal-close-x:hover{color:var(--text)}
.modal-body{padding:18px 20px}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--paper2)}
.modal-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;display:block;margin-bottom:6px}
.modal-text{font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:4px}

/* CONFIRM */
.confirm-modal .modal{border-color:var(--red-dim)}
.confirm-modal .modal::before{background:linear-gradient(90deg,transparent,var(--red),var(--red-dim),transparent)}
.confirm-modal .modal-title{color:var(--red)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--paper);border:1px solid var(--green-dim);padding:9px 16px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--green);z-index:9999;transform:translateY(20px);opacity:0;transition:all 0.25s;pointer-events:none;letter-spacing:1px;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}

/* SORT ARROW HELPER */
.sort-arrow{opacity:0.5;font-size:9px;margin-left:4px}

@media(max-width:700px){
  .sidebar{display:none}
  .dp-body{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-logo">
        <svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="30" stroke="#4a7228" stroke-width="1.5"/><circle cx="32" cy="32" r="8" stroke="#7ab648" stroke-width="2"/><path d="M32 24A8 8 0 0 1 40 32L46 28A16 16 0 0 0 32 8Z" fill="none" stroke="#7ab648" stroke-width="1.5"/><path d="M40 32A8 8 0 0 1 32 40L32 47A16 16 0 0 0 48 24Z" fill="none" stroke="#7ab648" stroke-width="1.5"/><path d="M32 40A8 8 0 0 1 24 32L18 36A16 16 0 0 0 32 56Z" fill="none" stroke="#7ab648" stroke-width="1.5"/><circle cx="32" cy="32" r="3" fill="#7ab648"/><circle cx="32" cy="14" r="2.5" fill="#7ab648"/><circle cx="46.3" cy="41" r="2.5" fill="#7ab648"/><circle cx="17.7" cy="41" r="2.5" fill="#7ab648"/></svg>
        <div><div class="sb-title">База образцов</div><div class="sb-sub">ЧАЗ · Архив</div></div>
      </div>
    </div>
    <div class="sb-stats">
      <div class="st-box"><div class="st-n" id="st-total">0</div><div class="st-l">Всего</div></div>
      <div class="st-box"><div class="st-n" id="st-done">0</div><div class="st-l">Изучено</div></div>

<script>
// ══════════════════════════════════════════════
// DB — IndexedDB wrapper
// ══════════════════════════════════════════════
const DB_NAME = 'StalkerArchiveDB';
const DB_VER  = 2;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('records')) {
        const s = d.createObjectStore('records', { keyPath: 'id' });
        s.createIndex('category', 'category', { unique: false });
        s.createIndex('status',   'status',   { unique: false });
      }
      if (!d.objectStoreNames.contains('photos')) {
        d.createObjectStore('photos', { keyPath: 'id' });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = e => reject(e.target.error);
  });
}

function txStore(storeName, mode) {
  return db.transaction([storeName], mode).objectStore(storeName);
}

function dbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    const req = txStore(storeName, 'readonly').getAll();
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

function dbGet(storeName, key) {
  return new Promise((resolve, reject) => {
    const req = txStore(storeName, 'readonly').get(key);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

function dbPut(storeName, obj) {
  return new Promise((resolve, reject) => {
    const req = txStore(storeName, 'readwrite').put(obj);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

function dbDelete(storeName, key) {
  return new Promise((resolve, reject) => {
    const req = txStore(storeName, 'readwrite').delete(key);
    req.onsuccess = e => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let records    = [];   // array of record objects
let categories = [];   // array of {id, name}
let currentCat = null; // null = all
let currentView= 'list';
let sortKey    = 'date';
let sortDir    = -1;
let editingId  = null; // id of record being edited/added (null = new)
let catEditId  = null; // id of category being renamed

const STATUS_META = {
  done:    { label: 'Изучен',   chipClass: 'chip-done',  dotClass: 'dot-done' },
  wip:     { label: 'В работе', chipClass: 'chip-wip',   dotClass: 'dot-wip'  },
  pending: { label: 'Ожидает',  chipClass: 'chip-wait',  dotClass: 'dot-wait' },
};

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) { if(!d) return '—'; const [y,m,day]=d.split('-'); return `${day}.${m}.${y}`; }
function padNum(n) { return String(n).padStart(3,'0'); }

// ══════════════════════════════════════════════
// CATEGORIES (localStorage)
// ══════════════════════════════════════════════
function loadCats() {
  try { categories = JSON.parse(localStorage.getItem('stalker_cats') || '[]'); } catch(e) { categories=[]; }
  if (!categories.length) {
    categories = [
      { id: uid(), name: 'Артефакты'  },
      { id: uid(), name: 'Мутанты'    },
      { id: uid(), name: 'Аномалии'   },
    ];
    saveCats();
  }
}

function saveCats() { localStorage.setItem('stalker_cats', JSON.stringify(categories)); }

// ══════════════════════════════════════════════
// SEED DATA
// ══════════════════════════════════════════════

      fullDesc: 'Зафиксирована устойчивая корреляция: концентрация мутантов повышается в радиусе 200–400 м от активной аномалии.\n\nТребует дополнительного исследования.',

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function getFiltered() {
  const q   = document.getElementById('search-input').value.toLowerCase();
  const st  = document.getElementById('filter-status').value;
  return records.filter(r => {
    if (currentCat && r.category !== currentCat) return false;
    if (st && r.status !== st) return false;
    if (q && !r.name.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b) => {
    let va = a[sortKey] || '', vb = b[sortKey] || '';
    if (sortKey === 'num') { va = a.num; vb = b.num; }
    if (va < vb) return -sortDir;
    if (va > vb) return  sortDir;
    return 0;
  });
}

function catName(id) {
  const c = categories.find(x => x.id === id);
  return c ? c.name : '—';
}

function statusChip(status) {
  const m = STATUS_META[status] || STATUS_META.pending;
  return `<span class="status-chip ${m.chipClass}"><span class="chip-dot ${m.dotClass}"></span>${m.label}</span>`;
}

async function renderAll() {
  records = await dbGetAll('records');
  updateStats();
  renderSidebar();
  renderContent();
}

function updateStats() {
  document.getElementById('st-total').textContent = records.length;
  document.getElementById('st-done').textContent  = records.filter(r=>r.status==='done').length;
  document.getElementById('st-wip').textContent   = records.filter(r=>r.status==='wip').length;
  document.getElementById('st-cats').textContent  = categories.length;
  document.getElementById('nav-all-count').textContent = records.length;
}

function renderSidebar() {
  const el = document.getElementById('cat-list');
  el.innerHTML = categories.map(c => {
    const cnt = records.filter(r => r.category === c.id).length;
    const isActive = currentCat === c.id;
    return `<button class="sb-item${isActive?' active':''}" onclick="filterCategory('${c.id}')">
      <span class="si-dot" style="background:var(--amber)"></span>
      <span class="si-name">${esc(c.name)}</span>
      <span class="si-count">${cnt}</span>
      <span class="si-actions">
        <span class="si-act-btn" onclick="event.stopPropagation();openRenameCat('${c.id}')" title="Переименовать">✎</span>
        <span class="si-act-btn del" onclick="event.stopPropagation();confirmDeleteCat('${c.id}')" title="Удалить">✕</span>
      </span>
    </button>`;
  }).join('');
}

function renderContent() {
  if (currentView === 'list') renderList();
  else renderCards();
}

function renderList() {
  const rows = getFiltered();
  const ca = document.getElementById('content-area');
  if (!rows.length) { ca.innerHTML = emptyState(); return; }

  const thSort = k => {
    let cls = 'th-sort';
    if (sortKey === k) cls = sortDir > 0 ? 'th-asc' : 'th-desc';
    return cls;
  };

  ca.innerHTML = `<table class="list-table">
    <thead><tr>
      <th class="${thSort('num')}"    onclick="doSort('num')">#</th>
      <th class="${thSort('name')}"   onclick="doSort('name')">Название</th>
      <th>Раздел</th>
      <th class="${thSort('status')}" onclick="doSort('status')">Статус</th>
      <th class="${thSort('date')}"   onclick="doSort('date')">Дата</th>
      <th>Описание</th>
    </tr></thead>
    <tbody>
    ${rows.map(r => `<tr class="data-row" onclick="openDetail('${r.id}')">
      <td class="mono">${padNum(r.num)}</td>
      <td><strong>${esc(r.name)}</strong></td>
      <td style="color:var(--text-dim);font-size:12px">${esc(catName(r.category))}</td>
      <td>${statusChip(r.status)}</td>
      <td class="mono" style="color:var(--text-dim)">${fmtDate(r.date)}</td>
      <td style="color:var(--text-dim);font-size:12px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.shortDesc||'')}</td>
    </tr>`).join('')}
    </tbody>
  </table>`;
}

function renderCards() {
  const rows = getFiltered();
  const ca = document.getElementById('content-area');
  if (!rows.length) { ca.innerHTML = emptyState(); return; }
  ca.innerHTML = `<div class="card-grid">${rows.map(r => {
    const hasPhoto = r.photos && r.photos.length > 0;
    const thumb = hasPhoto ? `<div class="cv-thumb" id="cv-thumb-${r.id}"></div>` : `<div class="cv-thumb"><div class="cv-thumb-empty">фото отсутствует</div></div>`;
    return `<div class="cv" onclick="openDetail('${r.id}')">
      ${thumb}
      <div class="cv-top">
        <div class="cv-num">${padNum(r.num)}</div>
        <div class="cv-name">${esc(r.name)}</div>
      </div>
      <div class="cv-body">${esc((r.shortDesc||'').slice(0,90))}${(r.shortDesc||'').length>90?'…':''}</div>
      <div class="cv-foot">
        <span class="cv-cat">${esc(catName(r.category))}</span>
        ${statusChip(r.status)}
      </div>
    </div>`;
  }).join('')}</div>`;

  // load thumbnails
  rows.filter(r => r.photos && r.photos.length).forEach(async r => {
    const el = document.getElementById(`cv-thumb-${r.id}`);
    if (!el) return;
    const photo = await dbGet('photos', r.photos[0]);
    if (photo) { el.innerHTML = `<img src="${photo.data}" alt="">`; }
    else { el.innerHTML = '<div class="cv-thumb-empty">фото</div>'; }
  });
}

function emptyState() {
  return `<div class="empty-state">
    <div class="es-ico">◈</div>
    <p>Записи не найдены.<br>Добавьте новую запись или измените фильтр.</p>
  </div>`;
}

// ══════════════════════════════════════════════
// DETAIL VIEW
// ══════════════════════════════════════════════
async function openDetail(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  const panel = document.getElementById('detail-panel');
  panel.classList.add('open');
  document.getElementById('dp-title').textContent = `#${padNum(r.num)} · ${r.name}`;
  document.getElementById('dp-actions').innerHTML = `
    <button class="act-btn btn-edit" onclick="openEditRecord('${id}')">✎ Редактировать</button>
    <button class="act-btn btn-del"  onclick="confirmDeleteRecord('${id}')">✕ Удалить</button>`;
  await renderDetailView(r);
}

async function renderDetailView(r) {
  const st = STATUS_META[r.status] || STATUS_META.pending;
  const cf = (r.customFields||[]).map(f => `<div class="cf-row"><div class="cf-key">${esc(f.key)}</div><div class="cf-val">${esc(f.val)}</div></div>`).join('');

  document.getElementById('dp-body').innerHTML = `
    <div class="dp-main">
      <div class="dp-block">
        <div class="dp-block-label">Визуальный осмотр / описание</div>
        <div class="dp-block-body">
          <div class="field-view"><div class="fv-label">Краткое описание</div>
            <div class="fv-val${!r.shortDesc?' empty':''}">${r.shortDesc?esc(r.shortDesc):'не внесено'}</div></div>
          <div class="field-view" style="margin-top:12px"><div class="fv-label">Полное описание / заметки</div>
            <div class="fv-val${!r.fullDesc?' empty':''}">${r.fullDesc?esc(r.fullDesc):'не внесено'}</div></div>
        </div>
      </div>
      ${cf ? `<div class="dp-block"><div class="dp-block-label">Дополнительные поля</div><div class="dp-block-body">${cf}</div></div>` : ''}
      <div class="dp-block">
        <div class="dp-block-label">Фотоматериалы</div>
        <div class="dp-block-body">
          <div class="photo-grid" id="dp-photo-grid"></div>
        </div>
      </div>
    </div>
    <div class="dp-side">
      <div class="dp-block">
        <div class="dp-block-label">Параметры</div>
        <div class="dp-block-body">
          <div class="field-view"><div class="fv-label">Номер</div><div class="fv-val mono">${padNum(r.num)}</div></div>
          <div class="field-view"><div class="fv-label">Раздел</div><div class="fv-val am">${esc(catName(r.category))}</div></div>
          <div class="field-view"><div class="fv-label">Статус</div>${statusChip(r.status)}</div>
          <div class="field-view"><div class="fv-label">Дата</div><div class="fv-val mono">${fmtDate(r.date)}</div></div>
        </div>
      </div>
    </div>`;

  // render photos
  await renderPhotoGrid(r, false);
}

async function renderPhotoGrid(r, editMode) {
  const grid = document.getElementById('dp-photo-grid');
  if (!grid) return;
  let html = '';
  for (const pid of (r.photos||[])) {
    const photo = await dbGet('photos', pid);
    if (photo) {
      if (editMode) {
        html += `<div class="photo-item">
          <img src="${photo.data}" alt="" onclick="openLightbox('${pid}')">
          <button class="photo-del" onclick="deletePhoto('${r.id}','${pid}')">✕</button>
        </div>`;
      } else {
        html += `<div class="photo-item">
          <img src="${photo.data}" alt="" onclick="openLightbox('${pid}')">
        </div>`;
      }
    }
  }
  if (editMode) {
    html += `<label class="photo-add-btn" title="Добавить фото">
      <span>＋</span><span>Фото</span>
      <input type="file" accept="image/*" multiple style="display:none" onchange="handlePhotoUpload(event,'${r.id}')">
    </label>`;
  }
  grid.innerHTML = html;
}

// ══════════════════════════════════════════════
// PHOTOS
// ══════════════════════════════════════════════
async function handlePhotoUpload(event, recordId) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  const r = records.find(x => x.id === recordId);
  if (!r) return;
  for (const file of files) {
    const data = await fileToBase64(file);
    const pid = uid();
    await dbPut('photos', { id: pid, data, name: file.name });
    if (!r.photos) r.photos = [];
    r.photos.push(pid);
  }
  await dbPut('records', r);
  const idx = records.findIndex(x=>x.id===recordId);
  if (idx>=0) records[idx]=r;
  await renderPhotoGrid(r, true);
  showToast('✓ Фото добавлено');
  event.target.value = '';
}

async function deletePhoto(recordId, photoId) {
  const r = records.find(x => x.id === recordId);
  if (!r) return;
  r.photos = (r.photos||[]).filter(p => p !== photoId);
  await dbPut('records', r);
  await dbDelete('photos', photoId);
  const idx = records.findIndex(x=>x.id===recordId);
  if (idx>=0) records[idx]=r;
  await renderPhotoGrid(r, true);
  showToast('Фото удалено');
}

function fileToBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

function openLightbox(photoId) {
  dbGet('photos', photoId).then(p => {
    if (!p) return;
    document.getElementById('lb-img').src = p.data;
    document.getElementById('lightbox').classList.add('open');
  });
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

// ══════════════════════════════════════════════
// EDIT RECORD
// ══════════════════════════════════════════════
function openAddRecord() {
  editingId = null;
  const maxNum = records.length ? Math.max(...records.map(r=>r.num)) : 0;
  renderEditForm({
    id: uid(), num: maxNum+1, name:'', category: currentCat||'',
    status:'pending', date: today(), shortDesc:'', fullDesc:'',
    photos:[], customFields:[]
  }, true);
}

async function openEditRecord(id) {
  const r = records.find(x=>x.id===id);
  if (!r) return;
  editingId = id;
  renderEditForm(r, false);
}

function renderEditForm(r, isNew) {
  editingId = r.id;
  const panel = document.getElementById('detail-panel');
  panel.classList.add('open');
  document.getElementById('dp-title').textContent = isNew ? 'Новая запись' : `Редактировать: ${r.name}`;
  document.getElementById('dp-actions').innerHTML = `
    <button class="act-btn btn-save" onclick="saveRecord()">✓ Сохранить</button>
    <button class="act-btn btn-cancel" onclick="cancelEdit('${r.id}','${isNew}')">Отмена</button>`;

  const catOptions = categories.map(c =>
    `<option value="${c.id}"${r.category===c.id?' selected':''}>${esc(c.name)}</option>`).join('');
  const cfHtml = (r.customFields||[]).map((f,i) =>
    `<div class="cf-pair" id="cfp-${i}">
      <input type="text" value="${esc(f.key)}" placeholder="Поле" class="cf-key-inp" data-idx="${i}">
      <input type="text" value="${esc(f.val)}" placeholder="Значение" class="cf-val-inp" data-idx="${i}">
      <button class="cf-rm" onclick="removeCF(${i})">✕</button>
    </div>`).join('');

  document.getElementById('dp-body').innerHTML = `
    <div class="dp-main">
      <div class="dp-block">
        <div class="dp-block-label">Основные поля</div>
        <div class="dp-block-body">
          <div class="form-grid">
            <div class="form-field">
              <label class="form-label">Название *</label>
              <input type="text" id="ef-name" value="${esc(r.name)}" placeholder="Название образца">
            </div>
            <div class="form-field">
              <label class="form-label">Раздел</label>
              <select id="ef-cat">
                <option value="">— без раздела —</option>
                ${catOptions}
              </select>
            </div>
            <div class="form-field">
              <label class="form-label">Статус</label>
              <select id="ef-status">
                <option value="pending"${r.status==='pending'?' selected':''}>Ожидает</option>
                <option value="wip"${r.status==='wip'?' selected':''}>В работе</option>
                <option value="done"${r.status==='done'?' selected':''}>Изучен</option>
              </select>
            </div>
            <div class="form-field">
              <label class="form-label">Дата</label>
              <input type="date" id="ef-date" value="${r.date||today()}">
            </div>
          </div>
          <div class="form-field" style="margin-top:12px">
            <label class="form-label">Краткое описание</label>
            <input type="text" id="ef-short" value="${esc(r.shortDesc||'')}" placeholder="Одна строка для списка">
          </div>
          <div class="form-field" style="margin-top:12px">
            <label class="form-label">Полное описание / заметки</label>
            <textarea id="ef-full" rows="6" placeholder="Подробное описание, наблюдения...">${esc(r.fullDesc||'')}</textarea>
          </div>
        </div>
      </div>
      <div class="dp-block">
        <div class="dp-block-label">Дополнительные поля</div>
        <div class="dp-block-body">
          <div class="cf-editor" id="cf-editor">${cfHtml}</div>
          <button class="cf-add" onclick="addCF()">＋ Добавить поле</button>
        </div>
      </div>
      <div class="dp-block">
        <div class="dp-block-label">Фотоматериалы</div>
        <div class="dp-block-body">
          <div class="photo-grid" id="dp-photo-grid"></div>
        </div>
      </div>
    </div>
    <div class="dp-side">
      <div class="dp-block">
        <div class="dp-block-label">Инфо</div>
        <div class="dp-block-body" style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);line-height:2">
          <div>Номер: <span style="color:var(--green)">${padNum(r.num)}</span></div>
          <div>ID: <span style="color:var(--text-faint);font-size:9px">${r.id}</span></div>
          <div style="margin-top:8px;color:var(--text-faint);font-size:9px">* — обязательное поле</div>
        </div>
      </div>
    </div>`;

  // store temp record for photo ops
  window._editRecord = JSON.parse(JSON.stringify(r));
  renderPhotoGrid(window._editRecord, true);
}

function addCF() {
  const editor = document.getElementById('cf-editor');
  const idx = editor.querySelectorAll('.cf-pair').length;
  const div = document.createElement('div');
  div.className = 'cf-pair';
  div.id = `cfp-${idx}`;
  div.innerHTML = `
    <input type="text" value="" placeholder="Поле" class="cf-key-inp" data-idx="${idx}">
    <input type="text" value="" placeholder="Значение" class="cf-val-inp" data-idx="${idx}">
    <button class="cf-rm" onclick="removeCF(${idx})">✕</button>`;
  editor.appendChild(div);
}

function removeCF(idx) {
  const el = document.getElementById(`cfp-${idx}`);
  if (el) el.remove();
}

function collectCF() {
  const pairs = document.querySelectorAll('.cf-pair');
  const result = [];
  pairs.forEach(p => {
    const k = p.querySelector('.cf-key-inp').value.trim();
    const v = p.querySelector('.cf-val-inp').value.trim();
    if (k) result.push({ key: k, val: v });
  });
  return result;
}

async function saveRecord() {
  const name = document.getElementById('ef-name').value.trim();
  if (!name) { showToast('⚠ Введите название'); return; }

  const existing = records.find(x=>x.id===editingId);
  const isNew = !existing;
  const maxNum = records.length ? Math.max(...records.map(r=>r.num)) : 0;

  const rec = {
    id:       editingId,
    num:      existing ? existing.num : maxNum + 1,
    name,
    category: document.getElementById('ef-cat').value,
    status:   document.getElementById('ef-status').value,
    date:     document.getElementById('ef-date').value,
    shortDesc:document.getElementById('ef-short').value.trim(),
    fullDesc: document.getElementById('ef-full').value.trim(),
    photos:   window._editRecord ? window._editRecord.photos : [],
    customFields: collectCF(),
  };

  await dbPut('records', rec);
  records = await dbGetAll('records');
  updateStats();
  renderSidebar();
  renderContent();
  document.getElementById('dp-title').textContent = `#${padNum(rec.num)} · ${rec.name}`;
  document.getElementById('dp-actions').innerHTML = `
    <button class="act-btn btn-edit" onclick="openEditRecord('${rec.id}')">✎ Редактировать</button>
    <button class="act-btn btn-del"  onclick="confirmDeleteRecord('${rec.id}')">✕ Удалить</button>`;
  await renderDetailView(rec);
  showToast(isNew ? '✓ Запись добавлена' : '✓ Сохранено');
}

async function cancelEdit(id, wasNew) {
  if (wasNew === 'true') {
    closeDetail();
  } else {
    const r = records.find(x=>x.id===id);
    if (r) await openDetail(id);
    else closeDetail();
  }
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  editingId = null;
  window._editRecord = null;
}

// ══════════════════════════════════════════════
// DELETE RECORD
// ══════════════════════════════════════════════
function confirmDeleteRecord(id) {
  const r = records.find(x=>x.id===id);
  if (!r) return;
  showConfirm(`Удалить запись «${r.name}»? Все данные и фото будут уничтожены.`, async () => {
    for (const pid of (r.photos||[])) await dbDelete('photos', pid);
    await dbDelete('records', id);
    records = await dbGetAll('records');
    updateStats(); renderSidebar(); renderContent();
    closeDetail();
    showToast('Запись удалена');
  });
}

// ══════════════════════════════════════════════
// CATEGORIES
// ══════════════════════════════════════════════
function openAddCat() {
  catEditId = null;
  document.getElementById('cat-modal-title').textContent = 'Новый раздел';
  document.getElementById('cat-name-input').value = '';
  openModal('modal-cat');
  setTimeout(() => document.getElementById('cat-name-input').focus(), 100);
}

function openRenameCat(id) {
  catEditId = id;
  const c = categories.find(x=>x.id===id);
  if (!c) return;
  document.getElementById('cat-modal-title').textContent = 'Переименовать раздел';
  document.getElementById('cat-name-input').value = c.name;
  openModal('modal-cat');
  setTimeout(() => document.getElementById('cat-name-input').focus(), 100);
}

function saveCat() {
  const name = document.getElementById('cat-name-input').value.trim();
  if (!name) { showToast('⚠ Введите название'); return; }
  if (catEditId) {
    const c = categories.find(x=>x.id===catEditId);
    if (c) c.name = name;
  } else {
    categories.push({ id: uid(), name });
  }
  saveCats();
  updateStats(); renderSidebar();
  closeModal('modal-cat');
  showToast(catEditId ? '✓ Переименовано' : '✓ Раздел добавлен');
  catEditId = null;
}

function confirmDeleteCat(id) {
  const c = categories.find(x=>x.id===id);
  if (!c) return;
  const cnt = records.filter(r=>r.category===id).length;
  showConfirm(`Удалить раздел «${c.name}»?${cnt?' Записи раздела останутся, но потеряют привязку.':''}`, () => {
    categories = categories.filter(x=>x.id!==id);
    saveCats();
    if (currentCat === id) { currentCat = null; document.getElementById('nav-all').classList.add('active'); }
    updateStats(); renderSidebar(); renderContent();
    showToast('Раздел удалён');
  });
}

// ══════════════════════════════════════════════
// FILTERS / SORT / VIEW
// ══════════════════════════════════════════════
function filterCategory(id) {
  currentCat = id;
  document.querySelectorAll('.sb-item').forEach(b => b.classList.remove('active'));
  if (id === null) {
    document.getElementById('nav-all').classList.add('active');
    document.getElementById('main-title').textContent = 'База аномальных образцов';
  } else {
    const c = categories.find(x=>x.id===id);
    document.getElementById('main-title').textContent = c ? c.name : 'Раздел';
  }
  renderContent();
}

function doSort(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  renderContent();
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('vbtn-' + v).classList.add('active');
  renderContent();
}

// ══════════════════════════════════════════════
// MODALS / CONFIRM / TOAST
// ══════════════════════════════════════════════
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

let confirmCallback = null;
function showConfirm(text, cb) {
  document.getElementById('confirm-text').textContent = text;
  confirmCallback = cb;
  openModal('modal-confirm');
}
document.getElementById('confirm-ok').addEventListener('click', () => {
  closeModal('modal-confirm');
  if (confirmCallback) { confirmCallback(); confirmCallback = null; }
});

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Escape HTML
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Overlay click to close modals
document.getElementById('modal-cat').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-cat')) closeModal('modal-cat');
});
document.getElementById('modal-confirm').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-confirm')) closeModal('modal-confirm');
});

// Search & filter live
document.getElementById('search-input').addEventListener('input', renderContent);
document.getElementById('filter-status').addEventListener('change', renderContent);

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal('modal-cat');
    closeModal('modal-confirm');
    closeLightbox();
  }
  if (e.key === 'Enter' && document.getElementById('modal-cat').classList.contains('open')) {
    saveCat();
  }
});

// Handle photo uploads for _editRecord
async function handlePhotoUpload(event, recordId) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  if (!window._editRecord) return;
  for (const file of files) {
    const data = await fileToBase64(file);
    const pid = uid();
    await dbPut('photos', { id: pid, data, name: file.name });
    if (!window._editRecord.photos) window._editRecord.photos = [];
    window._editRecord.photos.push(pid);
  }
  await renderPhotoGrid(window._editRecord, true);
  showToast('✓ Фото добавлено');
  event.target.value = '';
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
openDB().then(async () => {
  loadCats();
  await maybeSeed();
  records = await dbGetAll('records');
  updateStats();
  renderSidebar();
  renderContent();
}).catch(err => {
  document.getElementById('content-area').innerHTML =
    `<div class="empty-state"><div class="es-ico">⚠</div><p>Ошибка базы данных:<br>${err.message}</p></div>`;
});
</script>
